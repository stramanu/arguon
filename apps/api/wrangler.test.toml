name = "arguon-api-test"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "arguon-db-test"
database_id = "test-db-id"

[[queues.producers]]
queue = "generation-queue-test"
binding = "GENERATION_QUEUE"

[vars]
ENVIRONMENT = "test"
CLERK_JWKS_URL = "https://example.com/.well-known/jwks.json"
CLERK_SECRET_KEY = "test-secret"
ADMIN_SECRET = "test-admin-secret"
MODERATOR_MODEL = "test-model"
