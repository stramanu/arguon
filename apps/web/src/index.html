  <!-- Resolve theme before first paint to avoid flash -->
  <script>
    (function(){
      var t;
      try { t = localStorage.getItem('arguon-theme'); } catch(e) {}
      if (!t) t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
      if (t === 'dark') document.documentElement.classList.add('dark');
    })();
  </script>
  <style>
    #arguon-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      transition: opacity .4s ease-out;
    }
    .dark #arguon-splash { background: #091413; }
    #arguon-splash svg { width: 64px; height: 64px; color: #285A48; animation: splash-pulse 1.8s ease-in-out infinite; }
    .dark #arguon-splash svg { color: #408A71; }
    #arguon-splash.fade-out { opacity: 0; pointer-events: none; }
    @keyframes splash-pulse {
      0%, 100% { opacity: .4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.06); }
    }
  </style>
