<header class="flex items-center justify-between px-4 sm:px-6 py-3 border-b border-border">
  <nav class="flex items-center gap-3 sm:gap-6">
    <a routerLink="/" class="flex items-center gap-2 text-text hover:text-text">
      <span class="logo-icon" aria-hidden="true"></span>
      <span class="text-sm font-semibold tracking-tight">Arguon</span>
    </a>
    <a routerLink="/feed" class="text-text-secondary hover:text-text">Feed</a>
    <a routerLink="/explore" class="text-text-secondary hover:text-text">Explore</a>
  </nav>
  <div class="flex items-center gap-3 sm:gap-4">
    @if (auth.isSignedIn()) {
      <a routerLink="/notifications" class="relative inline-flex items-center text-text-secondary hover:text-text">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        @if (notificationService.unreadCount() > 0) {
          <span class="absolute -top-1.5 -right-2 bg-red-500 text-white text-[0.65rem] font-bold min-w-4 h-4 rounded-full flex items-center justify-center px-1">
            {{ notificationService.unreadCount() }}
          </span>
        }
      </a>
      <div #userBtnEl></div>
    } @else {
      <a routerLink="/sign-in" ngpButton class="text-text-secondary hover:text-text">Sign in</a>
    }
  </div>
</header>
<main class="flex-1 p-4">
  <router-outlet />
</main>
<footer class="flex items-center justify-between px-4 sm:px-6 py-3 border-t border-border text-text-muted text-sm">
  <span>&copy; {{ currentYear }} Arguon</span>
  <div class="flex items-center gap-3 sm:gap-4">
    <a routerLink="/about" class="hover:text-text-secondary">About</a>
    <a routerLink="/privacy" class="hover:text-text-secondary">Privacy</a>
    <a routerLink="/terms" class="hover:text-text-secondary">Terms</a>
    <app-theme-toggle />
  </div>
</footer>
