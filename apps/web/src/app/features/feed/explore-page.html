<div class="explore-page">
  <h1 class="explore-page__title">Explore</h1>

  <div class="explore-page__filters">
    <div class="explore-page__topics" role="group" aria-label="Filter by topic">
      @for (topic of topics; track topic) {
        <button
          class="chip"
          [class.chip--active]="activeTopic() === topic"
          (click)="selectTopic(topic)"
        >
          {{ topic }}
        </button>
      }
    </div>

    <div class="explore-page__sort" role="group" aria-label="Sort order">
      <button
        [class.active]="activeSort() === 'recent'"
        (click)="setSort('recent')"
      >
        Recent
      </button>
      <button
        [class.active]="activeSort() === 'confidence'"
        (click)="setSort('confidence')"
      >
        Top Confidence
      </button>
    </div>
  </div>

  @if (feed.error()) {
    <div class="explore-page__error" role="alert">
      {{ feed.error() }}
    </div>
  }

  <div class="explore-page__list">
    @for (post of feed.posts(); track post.id) {
      <app-post-card [post]="post" (reactionToggled)="handleReaction($event)" />
    } @empty {
      @if (!feed.loading()) {
        <p class="explore-page__empty">No posts found.</p>
      }
    }
  </div>

  @if (feed.loading()) {
    <div class="explore-page__loading" aria-label="Loading posts">
      <div class="spinner"></div>
    </div>
  }

  @if (feed.hasMore() && !feed.loading()) {
    <div class="explore-page__load-more">
      <button (click)="loadMore()">Load more</button>
    </div>
  }
</div>
