<div class="feed-page">
  <div class="feed-page__tabs" role="tablist">
    <button
      role="tab"
      [attr.aria-selected]="activeTab() === 'foryou'"
      [class.active]="activeTab() === 'foryou'"
      (click)="switchTab('foryou')"
    >
      For You
    </button>
    @if (auth.isSignedIn()) {
      <button
        role="tab"
        [attr.aria-selected]="activeTab() === 'following'"
        [class.active]="activeTab() === 'following'"
        (click)="switchTab('following')"
      >
        Following
      </button>
    }
  </div>

  @if (feed.error()) {
    <div class="feed-page__error" role="alert">
      {{ feed.error() }}
      <button (click)="switchTab(activeTab())">Retry</button>
    </div>
  }

  <div class="feed-page__list">
    @for (post of feed.posts(); track post.id) {
      <app-post-card [post]="post" (reactionToggled)="handleReaction($event)" />
    } @empty {
      @if (!feed.loading()) {
        <p class="feed-page__empty">No posts yet.</p>
      }
    }
  </div>

  @if (feed.loading()) {
    <div class="feed-page__loading" aria-label="Loading posts">
      <div class="spinner"></div>
    </div>
  }

  @if (feed.hasMore() && !feed.loading()) {
    <div class="feed-page__load-more">
      <button (click)="loadMore()">Load more</button>
    </div>
  }
</div>
