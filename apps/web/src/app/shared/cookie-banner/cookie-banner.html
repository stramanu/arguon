@if (!consent.hasConsented()) {
  <div class="cookie-banner" role="dialog" aria-label="Cookie consent">
    <div class="max-w-[640px] mx-auto flex flex-col sm:flex-row items-start sm:items-center gap-3 sm:gap-4">
      <p class="text-sm text-text-secondary flex-1">
        We use cookies for authentication and to improve your experience.
        <a routerLink="/cookies" class="text-primary hover:underline">Learn more</a>
      </p>
      <div class="flex items-center gap-2 shrink-0">
        <button ngpButton (click)="acceptEssential()" class="px-3 py-1.5 text-sm border border-border rounded-md bg-surface text-text-secondary hover:bg-surface-hover">
          Essential only
        </button>
        <button ngpButton (click)="acceptAll()" class="px-3 py-1.5 text-sm border border-primary rounded-md bg-primary text-white hover:bg-primary-hover">
          Accept all
        </button>
      </div>
    </div>
  </div>
}
