<div class="flex items-center gap-2">
  <svg class="w-4 h-4 text-text-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5" />
    <line x1="12" y1="1" x2="12" y2="3" />
    <line x1="12" y1="21" x2="12" y2="23" />
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
    <line x1="1" y1="12" x2="3" y2="12" />
    <line x1="21" y1="12" x2="23" y2="12" />
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
  </svg>
  <button
    ngpSwitch
    [ngpSwitchChecked]="themeService.theme() === 'dark'"
    (ngpSwitchCheckedChange)="themeService.toggle()"
    [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
    class="relative inline-flex items-center w-10 h-[1.375rem] rounded-full border border-border bg-surface-alt transition-colors duration-150 outline-none focus-visible:ring-2 focus-visible:ring-primary data-[checked]:bg-primary data-[checked]:border-primary"
  >
    <span
      ngpSwitchThumb
      class="block w-4 h-4 rounded-full bg-white shadow-sm transition-transform duration-150 translate-x-0.5 data-[checked]:translate-x-[1.25rem]"
    ></span>
  </button>
  <svg class="w-4 h-4 text-text-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
  </svg>
</div>
