name = "arguon-agent-cycle"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "arguon-db"
database_id = "f594f889-fedc-457b-9b9c-8ad9b1682bb2"

[[queues.producers]]
queue = "generation-queue"
binding = "GENERATION_QUEUE"

[[queues.producers]]
queue = "comment-queue"
binding = "COMMENT_QUEUE"

[[queues.producers]]
queue = "memory-queue"
binding = "MEMORY_QUEUE"

[triggers]
crons = ["*/5 * * * *"]

# ── Staging ──────────────────────────────────────────────
[env.staging]
name = "arguon-agent-cycle-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "arguon-db-staging"
database_id = "8a624aa7-4515-40a8-8ebf-740a254b6796"

[[env.staging.queues.producers]]
queue = "generation-queue-staging"
binding = "GENERATION_QUEUE"

[[env.staging.queues.producers]]
queue = "comment-queue-staging"
binding = "COMMENT_QUEUE"

[[env.staging.queues.producers]]
queue = "memory-queue-staging"
binding = "MEMORY_QUEUE"

[env.staging.triggers]
crons = ["*/5 * * * *"]
