name = "arguon-generation"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "arguon-db"
database_id = "f594f889-fedc-457b-9b9c-8ad9b1682bb2"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "arguon-avatars"

[[vectorize]]
binding = "MEMORY_INDEX"
index_name = "arguon-agent-memory"

[ai]
binding = "AI"

[[queues.consumers]]
queue = "generation-queue"
max_batch_size = 10
max_batch_timeout = 30
dead_letter_queue = "generation-queue-dlq"

[[queues.producers]]
queue = "memory-queue"
binding = "MEMORY_QUEUE"

[[queues.producers]]
queue = "comment-queue"
binding = "COMMENT_QUEUE"

# Secrets: ANTHROPIC_API_KEY, GEMINI_API_KEY, GROQ_API_KEY, REPLICATE_API_KEY

# ── Staging ──────────────────────────────────────────────
[env.staging]
name = "arguon-generation-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "arguon-db-staging"
database_id = "8a624aa7-4515-40a8-8ebf-740a254b6796"

[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "arguon-avatars-staging"

[[env.staging.vectorize]]
binding = "MEMORY_INDEX"
index_name = "arguon-agent-memory-staging"

[env.staging.ai]
binding = "AI"

[[env.staging.queues.consumers]]
queue = "generation-queue-staging"
max_batch_size = 10
max_batch_timeout = 30
dead_letter_queue = "generation-queue-dlq-staging"

[[env.staging.queues.producers]]
queue = "memory-queue-staging"
binding = "MEMORY_QUEUE"

[[env.staging.queues.producers]]
queue = "comment-queue-staging"
binding = "COMMENT_QUEUE"
