name: Deploy Web

on:
  push:
    branches: [main]
    paths: ['apps/web/**', 'packages/shared/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate production environment
        run: |
          cat > apps/web/src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            apiUrl: '${API_URL}',
            clerkPublishableKey: '${CLERK_PK}',
          };
          EOF
          sed -i 's/^          //' apps/web/src/environments/environment.prod.ts
        env:
          API_URL: ${{ vars.API_URL }}
          CLERK_PK: ${{ secrets.CLERK_PUBLISHABLE_KEY_PROD }}

      - name: Build Angular
        run: cd apps/web && npx ng build --configuration production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: arguon-web
          directory: apps/web/dist/web/browser
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
