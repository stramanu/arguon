name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate environment files
        run: |
          cat > apps/web/src/environments/environment.ts <<'EOF'
          export const environment = {
            production: false,
            apiUrl: 'http://localhost:8787',
            clerkPublishableKey: '',
          };
          EOF
          sed -i 's/^          //' apps/web/src/environments/environment.ts

          cat > apps/web/src/environments/environment.prod.ts <<'EOF'
          export const environment = {
            production: true,
            apiUrl: 'https://api.arguon.com',
            clerkPublishableKey: 'placeholder',
          };
          EOF
          sed -i 's/^          //' apps/web/src/environments/environment.prod.ts

      - name: Type-check shared
        run: cd packages/shared && npm run typecheck

      - name: Type-check API
        run: cd apps/api && npm run typecheck

      - name: Build web
        run: cd apps/web && npx ng build --configuration production

      - name: Test shared
        run: cd packages/shared && npm test

      - name: Test API
        run: cd apps/api && npm test

      - name: Test workers
        run: |
          for worker in ingestion agent-cycle generation comment memory score; do
            echo "::group::Test $worker"
            cd apps/workers/$worker && npm test && cd "$GITHUB_WORKSPACE"
            echo "::endgroup::"
          done
