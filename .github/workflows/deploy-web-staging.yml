name: Deploy Web (Staging)

on:
  workflow_dispatch:
  push:
    branches: [develop]
    paths: ['apps/web/**', 'packages/shared/**']

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate environment files
        run: |
          cat > apps/web/src/environments/environment.ts <<'DEVEOF'
          export const environment = {
            production: false,
            apiUrl: 'http://localhost:8787',
            clerkPublishableKey: '',
          };
          DEVEOF
          sed -i 's/^          //' apps/web/src/environments/environment.ts

          cat > apps/web/src/environments/environment.staging.ts <<EOF
          export const environment = {
            production: true,
            apiUrl: '${API_URL}',
            clerkPublishableKey: '${CLERK_PK}',
          };
          EOF
          sed -i 's/^          //' apps/web/src/environments/environment.staging.ts
        env:
          API_URL: ${{ vars.API_URL }}
          CLERK_PK: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

      - name: Build Angular (staging)
        run: cd apps/web && npx ng build --configuration staging

      - name: Deploy to Cloudflare Pages (staging)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: arguon-web
          directory: apps/web/dist/web/browser
          branch: develop
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
